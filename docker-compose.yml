services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite:///./store_intelligence.db
      - CORS_ORIGINS=http://localhost:5173
    volumes:
      - ./data:/app/data

  dashboard:
    image: node:22-alpine
    working_dir: /dashboard
    volumes:
      - ./dashboard:/dashboard
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - api
